<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Directory App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>User Directory</h1>
        <input type="text" id="searchInput" placeholder="Cerca utenti per nome, username o email...">
        <div id="userList" class="user-list">
            <!-- Le card degli utenti verranno renderizzate qui dinamicamente -->
            <p>Caricamento utenti...</p>
        </div>
    </div>

    <!-- Modale per i dettagli dell'utente -->
    <div id="userDetailsModal" class="modal">
        <div class="modal-content">
            <span class="close-button">&times;</span>
            <h2>Dettagli Utente</h2>
            <div id="modalUserDetails">
                <!-- I dettagli dell'utente verranno visualizzati qui -->
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
